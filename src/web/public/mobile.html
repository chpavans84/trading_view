          ${m.name ? `<div style="font-size:.66rem;color:var(--text3)">${m.name}</div>` : ''}
        </div>
        <div class="mvr-right">
          <div class="mvr-chg ${colorClass(chg)}">${chg != null ? fmtPct(chg) : '—'}</div>
          ${vol != null ? `<div class="mvr-vol">Vol ${(vol/1e6).toFixed(1)}M</div>` : ''}
        </div>
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="err-state">Movers unavailable<br><button class="retry-btn" onclick="loadWhaleMovers('${dir}')">Retry</button></div>`;
  }
}

/* ── AI Chat ─────────────────────────────────────────────────────────── */
let _chatStreaming = false;
let _recognition = null;
let _micActive = false;

async function loadAI() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';
  try {
    const data = await apiFetch('/api/chat/history');
    const msgs = data?.messages || [];
    if (!msgs.length) {
      container.innerHTML = `<div class="empty-state" style="padding:40px 0">
        <div style="font-size:2.5rem;margin-bottom:10px">🤖</div>
        <div style="font-weight:700;color:var(--text2);font-size:.95rem">Akshaya AI</div>
        <div style="font-size:.78rem;margin-top:6px;color:var(--text3)">Your personal trading assistant</div>
        <div style="font-size:.72rem;margin-top:4px;color:var(--text3)">Tap a prompt above or type below</div>
      </div>`;
      return;
    }
    container.innerHTML = msgs.map(m => renderBubble(m.role, m.content)).join('');
    scrollChat(false);
  } catch (e) {
    container.innerHTML = `<div class="err-state">Failed to load history<br><button class="retry-btn" onclick="loadAI()">Retry</button></div>`;
  }
}

function renderBubble(role, content, opts = {}) {
  const isUser = role === 'user';
  const wrapCls = isUser ? 'user' : 'bot';
  const bubbleCls = ['chat-bubble', isUser ? 'user' : 'bot', opts.streaming ? 'streaming' : ''].filter(Boolean).join(' ');
  const idAttr = opts.id ? `id="${opts.id}"` : '';
  const metaHtml = opts.metaId ? `<div class="chat-meta" id="${opts.metaId}"></div>` : '';
  return `<div class="chat-bubble-wrap ${wrapCls}" ${idAttr}>
    <div class="${bubbleCls}">${escapeHtml(content)}</div>${metaHtml}
  </div>`;
}

function escapeHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function scrollChat(smooth = true) {
  const el = document.getElementById('chat-messages');
  if (el) el.scrollTo({ top: el.scrollHeight, behavior: smooth ? 'smooth' : 'instant' });
}

function usePrompt(text) {
  const inp = document.getElementById('chat-input');
  if (!inp) return;
  inp.value = text;
  inp.style.height = 'auto';
  inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  inp.focus();
  haptic(10);
}

async function sendChat() {
  const inp = document.getElementById('chat-input');
  const msg = inp?.value?.trim();
  if (!msg || _chatStreaming) return;
  inp.value = '';
  inp.style.height = 'auto';
  haptic(15);

  const container = document.getElementById('chat-messages');
  const emptyEl = container.querySelector('.empty-state');
  if (emptyEl) emptyEl.remove();

  container.insertAdjacentHTML('beforeend', renderBubble('user', msg));
  scrollChat(false);

  const botWrapId = 'bw-' + Date.now();
  const botTxtId  = 'bt-' + Date.now();
  const botMetaId = 'bm-' + Date.now();
  container.insertAdjacentHTML('beforeend', `<div class="chat-bubble-wrap bot" id="${botWrapId}">
    <div class="chat-bubble bot streaming" id="${botTxtId}"></div>
    <div class="chat-meta" id="${botMetaId}"></div>
  </div>`);
  scrollChat(false);

  _chatStreaming = true;
  const sendBtn = document.getElementById('chat-send');
  if (sendBtn) sendBtn.disabled = true;

  let fullText = '';
  let toolNames = [];

  try {
    const res = await fetch('/api/chat', {
      method: 'POST', credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg }),
    });
    if (res.status === 401) { location.href = '/'; return; }
    if (!res.ok) {
      const err = await res.json().catch(() => ({}));
      throw new Error(err.error || 'Chat failed (' + res.status + ')');
    }

    const reader = res.body.getReader();
    const dec = new TextDecoder();
    let buf = '';

    while (true) {
      const { value, done } = await reader.read();
      if (done) break;
      buf += dec.decode(value, { stream: true });
      const parts = buf.split('\n\n');
      buf = parts.pop();
      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data:')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(5).trim()); } catch { continue; }

        if (ev.text) {
          fullText += ev.text;
          const el = document.getElementById(botTxtId);
          if (el) el.textContent = fullText;
          scrollChat(false);
        }
        if (ev.name) toolNames.push(ev.name);
        if (ev.knowledge && ev.content) {
          fullText = ev.content;
          const el = document.getElementById(botTxtId);
          if (el) el.textContent = fullText;
        }
        if (ev.done) {
          const el = document.getElementById(botTxtId);
          if (el) el.classList.remove('streaming');
          const metaEl = document.getElementById(botMetaId);
          if (metaEl) {
            const parts = [];
            if (ev.model) parts.push(ev.model);
            if (ev.credits != null) parts.push(ev.credits + ' credits left');
            if (toolNames.length) parts.push('🔧 ' + toolNames.join(', '));
            if (parts.length) metaEl.textContent = parts.join(' · ');
          }
        }
        if (ev.error) throw new Error(ev.error);
      }
    }
  } catch (e) {
    const el = document.getElementById(botTxtId);
    if (el) { el.textContent = e.message || 'Failed to get response'; el.classList.remove('streaming'); }
    toast('Chat error: ' + (e.message || 'unknown'), 3000);
  } finally {
    _chatStreaming = false;
    if (sendBtn) sendBtn.disabled = false;
    scrollChat();
  }
}

async function clearChat() {
  if (!confirm('Clear chat history?')) return;
  try {
    await apiFetch('/api/chat/clear', { method: 'POST' });
    const container = document.getElementById('chat-messages');
    container.innerHTML = `<div class="empty-state" style="padding:40px 0">
      <div style="font-size:2.5rem;margin-bottom:10px">🤖</div>
      <div style="font-weight:700;color:var(--text2)">Akshaya AI</div>
      <div style="font-size:.78rem;margin-top:6px;color:var(--text3)">Chat cleared</div>
    </div>`;
    toast('Chat cleared');
    haptic([20, 30, 20]);
  } catch (e) { toast('Failed to clear chat'); }
}

function toggleMic() {
  if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
    toast('Voice input not supported on this browser'); return;
  }
  const mic = document.getElementById('chat-mic');
  if (_micActive) { _recognition?.stop(); return; }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  _recognition = new SR();
  _recognition.lang = 'en-US';
  _recognition.continuous = false;
  _recognition.interimResults = true;
  _recognition.onstart = () => { _micActive = true; mic?.classList.add('listening'); haptic(20); };
  _recognition.onend = () => { _micActive = false; mic?.classList.remove('listening'); };
  _recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    const inp = document.getElementById('chat-input');
    if (inp) { inp.value = transcript; inp.style.height = 'auto'; inp.style.height = Math.min(inp.scrollHeight, 120) + 'px'; }
    if (e.results[e.results.length - 1].isFinal) _recognition.stop();
  };
  _recognition.onerror = (e) => { toast('Mic error: ' + e.error); _micActive = false; mic?.classList.remove('listening'); };
  _recognition.start();
}

/* Chat textarea auto-resize + Enter-to-send */
document.addEventListener('DOMContentLoaded', () => {
  const inp = document.getElementById('chat-input');
  if (!inp) return;
  inp.addEventListener('input', () => {
    inp.style.height = 'auto';
    inp.style.height = Math.min(inp.scrollHeight, 120) + 'px';
  });
  inp.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
  });
});

/* Apply proper height to chat screen (accounts for topbar + nav) */
function applyChatHeight() {
  const topbar = document.getElementById('topbar');
  const nav = document.getElementById('bottomnav');
  const wrap = document.getElementById('chat-wrap');
  if (!wrap || !topbar || !nav) return;
  const topH = topbar.getBoundingClientRect().height;
  const navH = nav.getBoundingClientRect().height;
  // applyTopPad sets paddingTop = topH+8 on all .screen elements;
  // chat-wrap height = remaining space below that padding, above nav
  wrap.style.height = (window.innerHeight - navH - topH - 8) + 'px';
}

/* ── Alerts ───────────────────────────────────────────────────────────── */
async function loadAlerts(force = false) {
  const [notifRes, sentinelRes, sysRes] = await Promise.allSettled([
    apiFetch('/api/notifications' + (force ? '?force=1' : '')),
    apiFetch('/api/sentinel/recent?limit=10'),
    apiFetch('/api/system-alerts/recent?limit=20'),
  ]);

  /* AI Observations */
  const notifEl = document.getElementById('alerts-notif-body');
  try {
    const data = notifRes.status === 'fulfilled' ? notifRes.value : null;
    const notifications = data?.notifications || [];
    const chip = document.getElementById('notif-count-chip');
    if (notifications.length) { chip.textContent = notifications.length; chip.style.display = ''; }
    else chip.style.display = 'none';
    if (!notifications.length) {
      notifEl.innerHTML = '<div class="empty-state">No observations right now</div>';
    } else {
      notifEl.innerHTML = notifications.map(n => {
        const priCls = 'priority-' + (n.priority || 'low');
        const actionHtml = n.action ? `<span class="notif-action-chip">${escapeHtml(n.action)}</span>` : '';
        const symHtml = n.symbol ? `<div class="notif-sym">${escapeHtml(n.symbol)}</div>` : '';
        const clickAttr = n.symbol ? `onclick="openStock('${escapeHtml(n.symbol)}')"` : '';
        return `<div class="notif-card ${priCls}" ${clickAttr}>
          <div class="notif-card-hdr">
            <div class="notif-type-dot ${n.type || 'INFO'}"></div>
            <div class="notif-title">${escapeHtml(n.title || '')}</div>
            ${actionHtml}
          </div>
          ${n.body ? `<div class="notif-body">${escapeHtml(n.body)}</div>` : ''}
          ${symHtml}
        </div>`;
      }).join('');
    }
  } catch (e) {
    notifEl.innerHTML = `<div class="err-state">Failed to load observations<br><button class="retry-btn" onclick="loadAlerts()">Retry</button></div>`;
  }

  /* Sentinel Runs */
  const sentEl = document.getElementById('alerts-sentinel-body');
  try {
    const data = sentinelRes.status === 'fulfilled' ? sentinelRes.value : null;
    const runs = data?.runs || [];
    const chip = document.getElementById('sentinel-count-chip');
    const withRisks = runs.filter(r => r.risk_count > 0);
    if (withRisks.length) { chip.textContent = withRisks.length + ' w/ risks'; chip.style.display = ''; }
    else chip.style.display = 'none';
    if (!runs.length) {
      sentEl.innerHTML = '<div class="empty-state">No sentinel runs found</div>';
    } else {
      sentEl.innerHTML = `<div class="card" style="padding:4px 10px">${runs.slice(0, 8).map(r => {
        const ago = timeAgo(r.as_of);
        return `<div class="sentinel-row">
          <div>
            <div class="sentinel-mode">${escapeHtml(r.mode || 'scheduled')}</div>
            <div class="sentinel-as-of">${ago}${r.email_sent ? ' · 📧 emailed' : ''}</div>
          </div>
          <div class="sentinel-right">
            ${r.risk_count > 0 ? `<span class="chip chip-red">${r.risk_count} risk${r.risk_count > 1 ? 's' : ''}</span>` : '<span class="chip chip-gray">clean</span>'}
            ${r.proposal_count > 0 ? `<span class="chip chip-yellow">${r.proposal_count} prop</span>` : ''}
          </div>
        </div>`;
      }).join('')}</div>`;
    }
  } catch (e) {
    sentEl.innerHTML = `<div class="err-state">Sentinel data unavailable</div>`;
  }

  /* System Alerts */
  const sysEl = document.getElementById('alerts-sys-body');
  try {
    const data = sysRes.status === 'fulfilled' ? sysRes.value : null;
    const alerts = data?.alerts || [];
    const chip = document.getElementById('sysalert-count-chip');
    const criticals = alerts.filter(a => a.severity === 'critical');
    if (criticals.length) { chip.textContent = criticals.length + ' critical'; chip.style.display = ''; }
    else chip.style.display = 'none';
    if (!alerts.length) {
      sysEl.innerHTML = '<div class="empty-state">No system alerts</div>';
    } else {
      sysEl.innerHTML = `<div class="card" style="padding:4px 10px">${alerts.slice(0, 15).map(a => {
        const sevCls = a.severity === 'critical' ? 'critical' : a.severity === 'warning' ? 'warning' : 'info';
        const ago = timeAgo(a.created_at);
        return `<div class="sysalert-row">
          <div class="sysalert-top">
            <span class="sysalert-sev-badge ${sevCls}">${escapeHtml(a.severity)}</span>
            <span class="sysalert-title">${escapeHtml(a.title || a.key || '')}</span>
          </div>
          <div class="sysalert-key">${escapeHtml(a.key || '')} · ${ago}</div>
        </div>`;
      }).join('')}</div>`;
    }
  } catch (e) {
    sysEl.innerHTML = `<div class="err-state">System alerts unavailable</div>`;
  }

  /* Update nav badge */
  (() => {
    try {
      const notifs = notifRes.status === 'fulfilled' ? (notifRes.value?.notifications || []) : [];
      const sys    = sysRes.status === 'fulfilled' ? (sysRes.value?.alerts || []) : [];
      const n = notifs.filter(x => x.priority === 'high').length + sys.filter(x => x.severity === 'critical').length;
      const badge = document.getElementById('alerts-badge');
      if (badge) { badge.textContent = n > 9 ? '9+' : n || ''; badge.style.display = n ? '' : 'none'; }
    } catch (_) {}
  })();
}

/* ── Nav wiring ──────────────────────────────────────────────────────── */
document.querySelectorAll('.nav-btn').forEach(btn => {
  btn.addEventListener('click', () => showTab(btn.dataset.tab));
});

/* ── Boot ────────────────────────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  applyTopPad();
  applyChatHeight();
  _loaded['home'] = true;
  loadHome();
  pollAlertBadge();
  setInterval(pollAlertBadge, 60_000);
  window.addEventListener('resize', () => { applyTopPad(); applyChatHeight(); });
});
</script>
