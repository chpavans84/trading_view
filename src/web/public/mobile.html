<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1">
<meta name="theme-color" content="#0d1117">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="TradingBot">
<link rel="manifest" href="/manifest.json">
<title>TradingBot</title>
<style>
/* ── Reset & Tokens ──────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--border2:#21262d;
  --text:#e6edf3;--text2:#8b949e;--text3:#6e7681;
  --accent:#58a6ff;--green:#3fb950;--red:#f85149;--yellow:#f7c948;
  --orange:#f0883e;--purple:#bc8cff;
  --nav-h:60px;
  --safe-t:env(safe-area-inset-top,0px);
  --safe-b:env(safe-area-inset-bottom,0px);
  --safe-l:env(safe-area-inset-left,0px);
  --safe-r:env(safe-area-inset-right,0px);
}
html,body{height:100%;background:var(--bg);color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif;
  overflow:hidden;-webkit-text-size-adjust:100%}

/* ── Top Bar ─────────────────────────────────────────────────────────── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  background:var(--surface);border-bottom:1px solid var(--border2);
  padding-top:var(--safe-t);
}
#topbar-inner{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px 10px;
}
#acct-block{flex:1;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
#acct-value{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;line-height:1;transition:color .3s}
#acct-value.pulse-up{animation:pulseUp .7s ease}
#acct-value.pulse-dn{animation:pulseDn .7s ease}
@keyframes pulseUp{0%,100%{color:var(--text)}40%{color:var(--green)}}
@keyframes pulseDn{0%,100%{color:var(--text)}40%{color:var(--red)}}
#acct-meta{display:flex;align-items:center;gap:8px;margin-top:3px}
#acct-pnl{font-size:.82rem;font-weight:700}
#acct-source-chip{
  font-size:.62rem;font-weight:700;padding:2px 7px;border-radius:20px;
  background:var(--border2);color:var(--text2);letter-spacing:.03em
}
#topbar-right{display:flex;align-items:center;gap:4px}
.tb-btn{
  background:none;border:none;padding:7px;cursor:pointer;
  color:var(--text2);font-size:1.15rem;line-height:1;
  -webkit-tap-highlight-color:transparent;border-radius:8px;
  position:relative;transition:color .15s
}
.tb-btn:active{color:var(--text)}
#market-dot{
  width:8px;height:8px;border-radius:50%;background:var(--text3);
  display:inline-block;margin-right:3px;transition:background .3s
}
#market-dot.open{background:var(--green);box-shadow:0 0 8px var(--green);animation:mktPulse 2s infinite}
@keyframes mktPulse{0%,100%{opacity:1}50%{opacity:.45}}
#bell-badge{
  position:absolute;top:3px;right:3px;background:var(--red);color:#fff;
  border-radius:9px;font-size:.55rem;font-weight:800;padding:1px 4px;
  min-width:14px;text-align:center;line-height:1.5;display:none;
  border:1.5px solid var(--surface)
}

/* ── Pull-to-Refresh ─────────────────────────────────────────────────── */
#ptr{
  position:fixed;top:0;left:0;right:0;z-index:150;
  display:flex;align-items:center;justify-content:center;
  height:0;overflow:hidden;background:var(--surface);
  transition:height .2s ease;
  padding-top:var(--safe-t);
  font-size:.8rem;color:var(--text3)
}
#ptr.pulling{height:52px}
#ptr.refreshing{height:52px}
#ptr-spinner{
  width:18px;height:18px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;margin-right:8px;display:none
}
#ptr.refreshing #ptr-spinner{display:block}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Main / Screens ──────────────────────────────────────────────────── */
#main{
  position:fixed;top:0;left:0;right:0;bottom:0;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  scroll-behavior:smooth;
}
.screen{
  display:none;min-height:100%;
  padding:0 12px 16px;
  /* dynamic top padding set by JS after topbar measures */
}
.screen.active{display:block}
.screen-pad-top{
  /* placeholder kept for each screen */
}

/* ── Bottom Nav ──────────────────────────────────────────────────────── */
#bottomnav{
  position:fixed;bottom:0;left:0;right:0;z-index:200;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--surface);border-top:1px solid var(--border2);
  display:flex;
}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  color:var(--text3);font-size:.57rem;font-weight:700;
  text-transform:uppercase;letter-spacing:.05em;
  padding:4px 0;cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:color .15s;position:relative;
}
.nav-btn .nav-icon{font-size:1.3rem;line-height:1}
.nav-btn.active{color:var(--accent)}
.nav-btn.active::after{
  content:'';position:absolute;top:0;left:20%;right:20%;
  height:2px;background:var(--accent);border-radius:0 0 2px 2px
}
.nav-badge{
  position:absolute;top:5px;right:calc(50% - 14px);
  background:var(--red);color:#fff;border-radius:9px;
  font-size:.55rem;font-weight:800;padding:1px 4px;min-width:14px;
  text-align:center;line-height:1.5;display:none;
  border:1.5px solid var(--surface)
}

/* ── FAB ─────────────────────────────────────────────────────────────── */
#fab{
  position:fixed;right:16px;
  bottom:calc(var(--nav-h) + var(--safe-b) + 14px);
  z-index:190;
  width:54px;height:54px;border-radius:50%;
  background:var(--accent);color:#000;
  border:none;font-size:1.4rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px rgba(88,166,255,.45);
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s,box-shadow .15s
}
#fab:active{transform:scale(.93);box-shadow:0 2px 8px rgba(88,166,255,.3)}

/* ── Skeleton Loader ─────────────────────────────────────────────────── */
@keyframes shimmer{
  0%{background-position:-400px 0}100%{background-position:400px 0}
}
.skel{
  background:linear-gradient(90deg,var(--surface2) 25%,var(--border2) 50%,var(--surface2) 75%);
  background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:6px
}
.skel-line{height:14px;margin-bottom:8px}
.skel-line.wide{width:100%}.skel-line.med{width:65%}.skel-line.short{width:35%}
.skel-card{height:90px;border-radius:12px;margin-bottom:10px}
.skel-row{height:50px;border-radius:8px;margin-bottom:8px}

/* ── Cards ───────────────────────────────────────────────────────────── */
.card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:14px;padding:14px 15px;margin-bottom:10px
}
.card.card-critical{border-color:var(--red);border-width:1.5px}
.card.card-warn{border-color:var(--yellow);border-width:1.5px}
.card-hdr{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:10px
}
.card-title{
  font-size:.68rem;font-weight:800;color:var(--text2);
  text-transform:uppercase;letter-spacing:.08em
}
.card-action{
  font-size:.7rem;color:var(--accent);font-weight:600;
  background:none;border:none;cursor:pointer;padding:0;
  -webkit-tap-highlight-color:transparent
}

/* ── P&L Hero Card ───────────────────────────────────────────────────── */
#pnl-card .pnl-main{display:flex;align-items:flex-end;justify-content:space-between}
#pnl-value{font-size:1.85rem;font-weight:800;letter-spacing:-.03em;line-height:1}
#pnl-pct{font-size:.9rem;font-weight:700;margin-top:4px}
#pnl-portfolio{font-size:.78rem;color:var(--text2);margin-top:2px}
#pnl-sparkline{flex-shrink:0;margin-left:10px}
#pnl-sparkline svg{display:block}

/* ── Position Rows ───────────────────────────────────────────────────── */
.pos-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  transition:background .1s;border-radius:6px;margin:0 -6px;padding-left:6px;padding-right:6px
}
.pos-row:last-child{border-bottom:none}
.pos-row:active{background:rgba(255,255,255,.04)}
.pos-sym{font-size:.92rem;font-weight:800}
.pos-name{font-size:.66rem;color:var(--text3);margin-top:1px}
.pos-mid{text-align:center;flex:1;padding:0 6px}
.pos-qty{font-size:.74rem;color:var(--text2)}
.pos-right{text-align:right}
.pos-mkt{font-size:.85rem;font-weight:700}
.pos-pl{font-size:.72rem;font-weight:700;margin-top:2px}

/* ── Catalyst Rows ───────────────────────────────────────────────────── */
.cat-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:9px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;-webkit-tap-highlight-color:transparent
}
.cat-row:last-child{border-bottom:none}
.cat-sym{font-size:.9rem;font-weight:800}
.cat-co{font-size:.66rem;color:var(--text3);margin-top:1px}
.cat-chips{display:flex;align-items:center;gap:5px;flex-wrap:wrap;justify-content:flex-end}

/* ── Badges / Chips ──────────────────────────────────────────────────── */
.chip{
  display:inline-block;border-radius:5px;font-size:.67rem;
  font-weight:700;padding:2px 7px;white-space:nowrap
}
.chip-green{background:rgba(63,185,80,.15);color:var(--green)}
.chip-red{background:rgba(248,81,73,.15);color:var(--red)}
.chip-blue{background:rgba(88,166,255,.15);color:var(--accent)}
.chip-yellow{background:rgba(247,201,72,.15);color:var(--yellow)}
.chip-gray{background:var(--border2);color:var(--text2)}
.chip-purple{background:rgba(188,140,255,.15);color:var(--purple)}
.pos{color:var(--green)}.neg{color:var(--red)}

/* ── Alert Card ──────────────────────────────────────────────────────── */
.alert-row{padding:8px 0;border-bottom:1px solid var(--border2)}
.alert-row:last-child{border-bottom:none}
.alert-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.alert-title{font-size:.82rem;font-weight:700;flex:1;line-height:1.3}
.alert-time{font-size:.66rem;color:var(--text3);white-space:nowrap}
.alert-key{font-size:.66rem;color:var(--text3);font-family:monospace}

/* ── Market Pulse ────────────────────────────────────────────────────── */
#pulse-scroll{
  display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;
  scrollbar-width:none;-webkit-overflow-scrolling:touch
}
#pulse-scroll::-webkit-scrollbar{display:none}
.pulse-card{
  flex-shrink:0;min-width:82px;background:var(--surface2);
  border:1px solid var(--border2);border-radius:10px;
  padding:10px 11px;text-align:center
}
.pulse-sym{font-size:.62rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.pulse-price{font-size:1rem;font-weight:800;margin:3px 0;line-height:1}
.pulse-chg{font-size:.7rem;font-weight:700}

/* ── Sentinel Card ───────────────────────────────────────────────────── */
.sentinel-meta{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.sentinel-stat{text-align:center;flex:1}
.sentinel-stat-val{font-size:1.3rem;font-weight:800}
.sentinel-stat-lbl{font-size:.63rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-top:2px}

/* ── Error / Empty States ────────────────────────────────────────────── */
.err-state{
  text-align:center;padding:22px 0;color:var(--text3);font-size:.82rem
}
.retry-btn{
  display:inline-block;margin-top:8px;padding:6px 16px;
  background:none;border:1px solid var(--border);border-radius:8px;
  color:var(--accent);font-size:.78rem;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent
}
.empty-state{text-align:center;padding:20px 0;color:var(--text3);font-size:.82rem}

/* ── Toast ───────────────────────────────────────────────────────────── */
#toast{
  position:fixed;bottom:calc(var(--nav-h) + var(--safe-b) + 70px);
  left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface2);border:1px solid var(--border);
  border-radius:10px;padding:10px 18px;font-size:.82rem;font-weight:600;
  color:var(--text);box-shadow:0 8px 28px rgba(0,0,0,.5);
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;z-index:500
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* ── Stub screens placeholder ────────────────────────────────────────── */
.stub-msg{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:50vh;color:var(--text3);gap:10px;text-align:center
}
.stub-msg .stub-icon{font-size:2.5rem}
.stub-msg .stub-txt{font-size:.9rem;font-weight:600;color:var(--text2)}
.stub-msg .stub-sub{font-size:.75rem}

/* ── Segmented control (Phase 2) ─────────────────────────────────────── */
.seg-wrap{
  position:sticky;top:0;z-index:10;
  background:var(--bg);padding:8px 0 6px;
  margin:0 -12px;padding-left:12px;padding-right:12px;
  border-bottom:1px solid var(--border2)
}
.seg-ctrl{
  display:flex;gap:6px;overflow-x:auto;
  scrollbar-width:none;-webkit-overflow-scrolling:touch
}
.seg-ctrl::-webkit-scrollbar{display:none}
.seg{
  flex-shrink:0;padding:6px 14px;border-radius:8px;
  border:1px solid var(--border);background:none;
  color:var(--text2);font-size:.76rem;font-weight:600;
  cursor:pointer;white-space:nowrap;
  -webkit-tap-highlight-color:transparent;transition:all .15s
}
.seg.active{background:var(--accent);color:#000;border-color:var(--accent)}
.seg-panel{display:none;padding-top:10px}
.seg-panel.active{display:block}

/* ── Signal cards (Markets › Signals) ───────────────────────────────── */
.sig-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:13px 14px;margin-bottom:8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent
}
.sig-card:active{background:var(--surface2)}
.sig-top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.sig-sym{font-size:.95rem;font-weight:800}
.sig-score-bar{flex:1;height:4px;background:var(--border2);border-radius:2px;overflow:hidden}
.sig-score-fill{height:100%;border-radius:2px;background:var(--accent);transition:width .4s}
.sig-score-num{font-size:.75rem;font-weight:700;color:var(--accent);min-width:28px;text-align:right}
.sig-reasons{display:flex;flex-direction:column;gap:3px}
.sig-reason{font-size:.72rem;color:var(--text2);padding-left:10px;position:relative}
.sig-reason::before{content:'·';position:absolute;left:2px;color:var(--accent)}

/* ── Watchlist rows (Markets › Watchlist) ────────────────────────────── */
.wl-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:11px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;-webkit-tap-highlight-color:transparent
}
.wl-row:last-child{border-bottom:none}
.wl-row:active{background:rgba(255,255,255,.03)}
.wl-sym{font-size:.9rem;font-weight:800}
.wl-name{font-size:.66rem;color:var(--text3);margin-top:1px}
.wl-right{text-align:right}
.wl-price{font-size:.88rem;font-weight:700}
.wl-chg{font-size:.72rem;font-weight:700;margin-top:2px}
#wl-add-btn{
  display:flex;align-items:center;justify-content:center;gap:6px;
  width:100%;margin-top:12px;padding:11px;
  background:none;border:1px dashed var(--border);border-radius:10px;
  color:var(--accent);font-size:.82rem;font-weight:600;cursor:pointer;
  -webkit-tap-highlight-color:transparent
}

/* ── Calendar (Markets › Calendar) ──────────────────────────────────── */
.cal-days{
  display:flex;gap:6px;margin-bottom:12px;overflow-x:auto;
  scrollbar-width:none
}
.cal-days::-webkit-scrollbar{display:none}
.cal-day-btn{
  flex-shrink:0;padding:7px 14px;border-radius:8px;
  border:1px solid var(--border);background:none;
  color:var(--text2);font-size:.76rem;font-weight:600;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  text-align:center;min-width:52px;transition:all .15s
}
.cal-day-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.cal-day-btn .cal-day-name{font-size:.62rem;letter-spacing:.05em;text-transform:uppercase}
.cal-day-btn .cal-day-num{font-size:.9rem;font-weight:800;margin-top:1px}
.cal-row{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 0;border-bottom:1px solid var(--border2);
  cursor:pointer;-webkit-tap-highlight-color:transparent
}
.cal-row:last-child{border-bottom:none}
.cal-sym{font-size:.88rem;font-weight:800}
.cal-co{font-size:.65rem;color:var(--text3);margin-top:1px}
.cal-right{text-align:right}
.cal-eps{font-size:.72rem;color:var(--text2)}

/* ── Forecast rows ───────────────────────────────────────────────────── */
.fc-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;margin-bottom:8px;overflow:hidden
}
.fc-hdr{
  display:flex;align-items:center;gap:10px;
  padding:11px 14px;border-bottom:1px solid var(--border2)
}
.fc-sym{font-size:.9rem;font-weight:800}
.fc-days{display:flex}
.fc-day{
  flex:1;text-align:center;padding:8px 4px;
  border-right:1px solid var(--border2)
}
.fc-day:last-child{border-right:none}
.fc-day-lbl{font-size:.58rem;color:var(--text3);text-transform:uppercase;letter-spacing:.05em}
.fc-day-val{font-size:.78rem;font-weight:700;margin-top:2px}
.fc-day-conf{font-size:.6rem;color:var(--text3);margin-top:1px}

/* ── Whale: Flow cards ───────────────────────────────────────────────── */
.flow-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:12px 14px;margin-bottom:8px
}
.flow-top{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.flow-sym{font-size:.95rem;font-weight:800}
.flow-side-call{color:var(--green);font-weight:700;font-size:.78rem}
.flow-side-put{color:var(--red);font-weight:700;font-size:.78rem}
.flow-meta{display:flex;gap:12px;flex-wrap:wrap}
.flow-item{font-size:.72rem;color:var(--text2)}
.flow-item span{color:var(--text);font-weight:600}
.flow-premium{font-size:.88rem;font-weight:800;color:var(--yellow)}

/* ── Whale: Insider & Congress ───────────────────────────────────────── */
.ins-card,.cong-card{
  background:var(--surface);border:1px solid var(--border2);
  border-radius:12px;padding:12px 14px;margin-bottom:8px;
  cursor:pointer;-webkit-tap-highlight-color:transparent
}
.ins-card:active,.cong-card:active{background:var(--surface2)}
.ins-top,.cong-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.ins-sym,.cong-sym{font-size:.95rem;font-weight:800}
.ins-net{font-size:.88rem;font-weight:800}
.ins-detail,.cong-detail{font-size:.72rem;color:var(--text2);line-height:1.5}
.party-D{color:var(--accent)}.party-R{color:var(--red)}

/* ── Whale: Correlations ─────────────────────────────────────────────── */
#cor-input-wrap{display:flex;gap:8px;margin-bottom:12px}
#cor-input{
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:9px 13px;color:var(--text);
  font-size:.9rem;outline:none;text-transform:uppercase
}
#cor-input:focus{border-color:var(--accent)}
#cor-go{
  padding:9px 16px;background:var(--accent);color:#000;
  border:none;border-radius:10px;font-weight:700;cursor:pointer;
  font-size:.82rem;-webkit-tap-highlight-color:transparent
}
.cor-table{width:100%;border-collapse:collapse;font-size:.78rem}
.cor-table th{
  text-align:left;padding:6px 10px;color:var(--text3);
  font-size:.65rem;text-transform:uppercase;letter-spacing:.06em;
  border-bottom:1px solid var(--border2)
}
.cor-table td{padding:9px 10px;border-bottom:1px solid var(--border2)}
.cor-table tr:last-child td{border-bottom:none}
.cor-hi{color:var(--green)}.cor-lo{color:var(--red)}.cor-mid{color:var(--text2)}

/* ── Whale: Movers sub-tabs ──────────────────────────────────────────── */
.mvr-tabs{display:flex;gap:0;margin-bottom:10px;border:1px solid var(--border2);border-radius:8px;overflow:hidden}
.mvr-tab{
  flex:1;padding:8px 0;background:none;border:none;
  color:var(--text2);font-size:.75rem;font-weight:700;
  cursor:pointer;-webkit-tap-highlight-color:transparent;
  text-align:center;transition:all .15s
}
.mvr-tab:not(:last-child){border-right:1px solid var(--border2)}
.mvr-tab.active{background:var(--surface2);color:var(--text)}
.mvr-row{
  display:flex;align-items:center;justify-content:space-between;

<!-- ── Top Bar ─────────────────────────────────────────────────────── -->
<div id="topbar">
  <div id="topbar-inner">
    <div id="acct-block" role="button" aria-label="Toggle account source">
      <div id="acct-value">$—</div>
      <div id="acct-meta">
        <span id="acct-pnl">—</span>
        <span id="acct-source-chip">Paper</span>
      </div>
    </div>
    <div id="topbar-right">
      <span id="market-dot" title="Market status"></span>
      <button class="tb-btn" id="notif-btn" aria-label="Notifications">
        🔔<span id="bell-badge"></span>
      </button>
      <button class="tb-btn" id="menu-btn" aria-label="Menu">☰</button>
    </div>
  </div>
</div>

<!-- ── Pull-to-Refresh ─────────────────────────────────────────────── -->
<div id="ptr">
  <div id="ptr-spinner"></div>
  <span id="ptr-label">Pull to refresh</span>
</div>

<!-- ── Main Content ────────────────────────────────────────────────── -->
<div id="main">

  <!-- Home -->
  <div class="screen active" id="screen-home" role="main" aria-label="Home">

    <!-- P&L Hero -->
    <div class="card" id="pnl-card">
      <div class="card-hdr">
        <span class="card-title">Portfolio</span>
        <button class="card-action" id="pnl-source-toggle" aria-label="Switch source">Paper ▾</button>
      </div>
      <div id="pnl-body"><div class="skel skel-card"></div></div>
    </div>

    <!-- Open Positions -->
    <div class="card" id="positions-card">
      <div class="card-hdr">
        <span class="card-title">Open Positions</span>
        <span id="pos-count" class="chip chip-gray"></span>
      </div>
      <div id="positions-body">
        <div class="skel skel-row"></div>
        <div class="skel skel-row"></div>
        <div class="skel skel-row" style="width:70%"></div>
      </div>
    </div>

    <!-- Catalysts on Holdings -->
    <div class="card" id="catalysts-card" style="display:none">
      <div class="card-hdr">
        <span class="card-title">📅 Upcoming Catalysts</span>
        <span class="chip chip-yellow" id="cat-count"></span>
      </div>
      <div id="catalysts-body"></div>
    </div>

    <!-- Critical Alert -->
    <div class="card card-critical" id="critical-card" style="display:none">
      <div class="card-hdr">
        <span class="card-title">🚨 Critical Alert</span>
        <button class="card-action" onclick="showTab('alerts')">View All →</button>
      </div>
      <div id="critical-body"></div>
    </div>

    <!-- Sentinel Summary -->
    <div class="card card-warn" id="sentinel-card" style="display:none">
      <div class="card-hdr">
        <span class="card-title">🛡️ Sentinel Activity</span>
        <button class="card-action" onclick="showTab('alerts')">View →</button>
      </div>
      <div id="sentinel-body"></div>
    </div>

    <!-- Market Pulse -->
    <div class="card" id="pulse-card">
      <div class="card-hdr"><span class="card-title">Market Pulse</span></div>
      <div id="pulse-body">
        <div style="display:flex;gap:8px">
          <div class="skel" style="width:82px;height:70px;border-radius:10px;flex-shrink:0"></div>
          <div class="skel" style="width:82px;height:70px;border-radius:10px;flex-shrink:0"></div>
          <div class="skel" style="width:82px;height:70px;border-radius:10px;flex-shrink:0"></div>
          <div class="skel" style="width:82px;height:70px;border-radius:10px;flex-shrink:0"></div>
        </div>
      </div>

  <!-- Markets (Phase 2) -->

        <button class="seg active" data-panel="catalysts" role="tab" aria-selected="true">Catalysts</button>
        <button class="seg" data-panel="forecast" role="tab" aria-selected="false">Forecast</button>
        <button class="seg" data-panel="signals" role="tab" aria-selected="false">Signals</button>
        <button class="seg" data-panel="watchlist" role="tab" aria-selected="false">Watchlist</button>
        <button class="seg" data-panel="calendar" role="tab" aria-selected="false">Calendar</button>
      </div>
    </div>
    <div class="seg-panel active" id="mkts-catalysts" role="tabpanel">
      <div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>

    <div class="seg-panel" id="mkts-watchlist" role="tabpanel">

    </div>
    <div class="seg-panel" id="mkts-calendar" role="tabpanel">

  <!-- Whale (Phase 2) -->

      <div class="seg-ctrl" id="whale-seg-ctrl" role="tablist" aria-label="Whale sections">

        <button class="seg" data-panel="movers" role="tab" aria-selected="false">📈 Movers</button>

      <div class="skel skel-card"></div><div class="skel skel-card"></div>
    </div>
    <div class="seg-panel" id="whale-congress" role="tabpanel">
      <div class="skel skel-card"></div><div class="skel skel-card"></div>
    </div>
    <div class="seg-panel" id="whale-correlations" role="tabpanel">
      <div id="cor-input-wrap">
        <input id="cor-input" type="text" placeholder="Enter ticker (e.g. AAPL)" maxlength="6" aria-label="Ticker for correlation">
        <button id="cor-go" onclick="runCorrelation()">Go</button>

    </div>
    <div class="seg-panel" id="whale-movers" role="tabpanel">

<script>
'use strict';

/* ── Config ──────────────────────────────────────────────────────────── */
const BASE = '';        // same origin
let SOURCE = 'alpaca';  // alpaca | moomoo | alpaca_live
let SCREENSHOT = false; // hide values when true
let _topH = 72;         // topbar height in px (measured after render)

/* ── apiFetch ────────────────────────────────────────────────────────── */
async function apiFetch(path, opts = {}) {
  const res = await fetch(BASE + path, {
    credentials: 'include',
    headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
    ...opts,
  });
  if (res.status === 401) { location.href = '/'; throw new Error('UNAUTHORIZED'); }
  const text = await res.text();
  try { return JSON.parse(text); } catch { return { raw: text }; }
}

/* ── Haptic ──────────────────────────────────────────────────────────── */
const mq = window.matchMedia('(prefers-reduced-motion: reduce)');
function haptic(pattern = 10) {
  if (!mq.matches && navigator.vibrate) navigator.vibrate(pattern);
}

/* ── Toast ───────────────────────────────────────────────────────────── */
let _toastTimer;
function toast(msg, ms = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.classList.remove('show'), ms);
}

/* ── Formatters ──────────────────────────────────────────────────────── */
const fmt2 = n => (n == null || isNaN(n)) ? '—' : Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtDollar = n => {
  if (n == null || isNaN(n)) return '—';
  const a = Math.abs(n), s = n < 0 ? '-' : '';
  if (a >= 1e6) return s + '$' + (a / 1e6).toFixed(2) + 'M';
  if (a >= 1e3) return s + '$' + (a / 1e3).toFixed(1) + 'K';
  return (n < 0 ? '-$' : '$') + a.toFixed(2);
};
const fmtPct = n => (n == null || isNaN(n)) ? '—' : (n >= 0 ? '+' : '') + n.toFixed(2) + '%';
const colorClass = n => (n == null || isNaN(n)) ? '' : (n >= 0 ? 'pos' : 'neg');
const maskVal = v => SCREENSHOT ? '$••••••' : v;

/* ── Sparkline ───────────────────────────────────────────────────────── */
function sparkline(data, w = 120, h = 44, color) {
  if (!data || data.length < 2) return '';
  const min = Math.min(...data), max = Math.max(...data);
  const range = max - min || 1;
  const pts = data.map((v, i) =>
    `${(i / (data.length - 1)) * w},${h - ((v - min) / range) * (h - 4) - 2}`
  ).join(' ');
  const c = color || (data[data.length - 1] >= data[0] ? '#3fb950' : '#f85149');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" aria-hidden="true">
    <polyline points="${pts}" fill="none" stroke="${c}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
  </svg>`;
}

/* ── Navigation ──────────────────────────────────────────────────────── */
let _activeTab = 'home';
const _loaded = {};

function showTab(id) {
  haptic(10);
  closeLpPop?.();
  closeSheet?.();
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => {
    const active = b.dataset.tab === id;
    b.classList.toggle('active', active);
    b.setAttribute('aria-selected', String(active));
  });
  const screen = document.getElementById('screen-' + id);
  if (screen) screen.classList.add('active');
  _activeTab = id;
  if (!_loaded[id]) { _loaded[id] = true; loadTab(id); }
}

function loadTab(id) {
  if (id === 'home')    loadHome();
  if (id === 'markets') loadMarkets();
  if (id === 'whale')   loadWhale();
  if (id === 'ai')      loadAI();
  if (id === 'alerts')  loadAlerts();
}

/* ── Top bar measured padding ────────────────────────────────────────── */
function applyTopPad() {
  const h = document.getElementById('topbar').getBoundingClientRect().height;
  _topH = h;
  document.querySelectorAll('.screen').forEach(s => {
    s.style.paddingTop = (h + 8) + 'px';
  });
}

/* ── Account toggle ──────────────────────────────────────────────────── */
const SOURCES = [
  { key: 'alpaca',      label: 'Paper' },
  { key: 'moomoo',      label: 'Moomoo' },
  { key: 'alpaca_live', label: 'Live' },
];
let _srcIdx = 0;

function nextSource() {
  haptic(10);
  _srcIdx = (_srcIdx + 1) % SOURCES.length;
  SOURCE = SOURCES[_srcIdx].key;
  document.getElementById('acct-source-chip').textContent = SOURCES[_srcIdx].label;
  document.getElementById('pnl-source-toggle').textContent = SOURCES[_srcIdx].label + ' ▾';
  _loaded['home'] = false;
  loadHome();
}

/* ── Screenshot mode ─────────────────────────────────────────────────── */
let _longPressTimer;
document.getElementById('acct-block').addEventListener('pointerdown', () => {
  _longPressTimer = setTimeout(() => {
    SCREENSHOT = !SCREENSHOT;
    haptic([30, 50, 30]);
    toast(SCREENSHOT ? '🔒 Values hidden' : '🔓 Values visible');
    refreshAccountDisplay();
  }, 700);
});
document.getElementById('acct-block').addEventListener('pointerup', () => clearTimeout(_longPressTimer));
document.getElementById('acct-block').addEventListener('pointerleave', () => clearTimeout(_longPressTimer));
document.getElementById('acct-block').addEventListener('click', nextSource);

/* ── Market status ───────────────────────────────────────────────────── */
function updateMarketDot(status) {
  const dot = document.getElementById('market-dot');
  const isOpen = status && (status.includes('OPEN') || status === 'open');
  dot.classList.toggle('open', isOpen);
  dot.title = isOpen ? 'Market Open' : 'Market Closed';
}

/* ── Home: cached data ───────────────────────────────────────────────── */
let _dashData = null;
let _pnlData = null;

function refreshAccountDisplay() {
  if (!_dashData) return;
  const val = _dashData.account?.portfolio_value;
  const pnl = _pnlData?.today?.pnl ?? _dashData.pnl?.pnl;
  const pct = _dashData.pnl?.pnl_pct;
  const el = document.getElementById('acct-value');
  el.textContent = maskVal('$' + fmt2(val));
  const pnlEl = document.getElementById('acct-pnl');
  const sign = (pnl || 0) >= 0 ? '+' : '';
  pnlEl.textContent = maskVal(sign + fmtDollar(pnl) + ' ' + fmtPct(pct));
  pnlEl.className = colorClass(pnl);
}

/* ── Home: P&L card ──────────────────────────────────────────────────── */
async function loadPnl() {
  try {
    const [dash, pnlRes] = await Promise.allSettled([
      apiFetch('/api/dashboard?source=' + SOURCE),
      apiFetch('/api/pnl?days=30&source=' + SOURCE),
    ]);

    _dashData = dash.status === 'fulfilled' ? dash.value : null;
    _pnlData  = pnlRes.status === 'fulfilled' ? pnlRes.value : null;

    if (!_dashData) throw new Error('Dashboard unavailable');

    updateMarketDot(_dashData.market_status);
    refreshAccountDisplay();

    const val = _dashData.account?.portfolio_value;
    const pnl = _pnlData?.today?.pnl ?? _dashData.pnl?.pnl ?? 0;
    const pct = _dashData.pnl?.pnl_pct ?? 0;
    const history = _pnlData?.history?.slice(-14).map(r => r.pnl) || [];

    const pnlColor = pnl >= 0 ? '#3fb950' : '#f85149';
    const pnlSign = pnl >= 0 ? '+' : '';

    document.getElementById('pnl-body').innerHTML = `
      <div class="pnl-main">
        <div>
          <div id="pnl-value" class="${colorClass(pnl)}" style="font-size:1.75rem;font-weight:800;letter-spacing:-.03em">
            ${maskVal(pnlSign + fmtDollar(pnl))}
          </div>
          <div id="pnl-pct" class="${colorClass(pnl)}" style="font-size:.85rem;font-weight:700;margin-top:3px">
            ${fmtPct(pct)} today
          </div>
          <div id="pnl-portfolio" style="font-size:.75rem;color:var(--text2);margin-top:4px">
            Portfolio: ${maskVal('$' + fmt2(val))}
          </div>
        </div>
        <div id="pnl-sparkline">${history.length > 1 ? sparkline(history, 110, 50, pnlColor) : ''}</div>
      </div>`;

    // Pulse animation on value
    const acctEl = document.getElementById('acct-value');
    acctEl.classList.remove('pulse-up', 'pulse-dn');
    void acctEl.offsetWidth;
    acctEl.classList.add(pnl >= 0 ? 'pulse-up' : 'pulse-dn');

  } catch (e) {
    document.getElementById('pnl-body').innerHTML =
      `<div class="err-state">Failed to load portfolio<br>
       <button class="retry-btn" onclick="loadPnl()">Retry</button></div>`;
  }
}

/* ── Home: Positions card ────────────────────────────────────────────── */
async function loadPositions() {
  const body = document.getElementById('positions-body');
  const countEl = document.getElementById('pos-count');
  try {
    const data = _dashData || await apiFetch('/api/dashboard?source=' + SOURCE);
    const positions = data.positions || [];
    countEl.textContent = positions.length;
    countEl.style.display = positions.length ? '' : 'none';

    if (!positions.length) {
      body.innerHTML = '<div class="empty-state">No open positions</div>';
      return;
    }

    body.innerHTML = positions.map(p => {
      const pl = p.unrealized_pl ?? 0;
      const plPct = (p.unrealized_plpc ?? 0) * 100;
      const mktVal = (p.current_price ?? 0) * (p.qty ?? 0);
      return `<div class="pos-row" onclick="openStock('${p.symbol}')">
        <div>
          <div class="pos-sym">${p.symbol}</div>
          <div class="pos-name">${p.qty} shares</div>
        </div>
        <div class="pos-mid">
          <div class="pos-qty" style="font-size:.7rem;color:var(--text2)">
            ${maskVal('$' + fmt2(p.current_price))}
          </div>
        </div>
        <div class="pos-right">
          <div class="pos-mkt">${maskVal(fmtDollar(mktVal))}</div>
          <div class="pos-pl ${colorClass(pl)}">
            ${maskVal((pl >= 0 ? '+' : '') + fmtDollar(pl))} (${fmtPct(plPct)})
          </div>
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    body.innerHTML = `<div class="err-state">Failed to load positions<br>
      <button class="retry-btn" onclick="loadPositions()">Retry</button></div>`;
  }
}

/* ── Home: Catalysts card ────────────────────────────────────────────── */
async function loadCatalysts() {
  const card = document.getElementById('catalysts-card');
  const body = document.getElementById('catalysts-body');
  const countEl = document.getElementById('cat-count');
  try {
    const [catRes, dashRes] = await Promise.allSettled([
      apiFetch('/api/tomorrow-catalysts'),
      Promise.resolve(_dashData),
    ]);
    const cats = catRes.status === 'fulfilled' ? (catRes.value?.catalysts || catRes.value || []) : [];
    const held = new Set((_dashData?.positions || []).map(p => p.symbol));
    const relevant = Array.isArray(cats)
      ? cats.filter(c => c.symbol && held.has(c.symbol)).slice(0, 5)
      : [];

    if (!relevant.length) { card.style.display = 'none'; return; }

    card.style.display = '';
    countEl.textContent = relevant.length;
    body.innerHTML = relevant.map(c => {
      const timing = c.timing || c.when || '';
      const daysUntil = c.days_until ?? c.daysUntil ?? 0;
      const sentiment = c.conviction || c.sentiment || '';
      const sentChip = sentiment.toLowerCase().includes('bull')
        ? '<span class="chip chip-green">🐂 Bull</span>'
        : sentiment.toLowerCase().includes('bear')
          ? '<span class="chip chip-red">🐻 Bear</span>'
          : sentiment ? `<span class="chip chip-gray">${sentiment}</span>` : '';

      return `<div class="cat-row" onclick="openStock('${c.symbol}')">
        <div>
          <div class="cat-sym">${c.symbol}</div>
          <div class="cat-co">${c.company || c.name || ''}</div>
        </div>
        <div class="cat-chips">
          ${timing ? `<span class="chip chip-blue">${timing}</span>` : ''}
          ${daysUntil <= 1 ? '<span class="chip chip-yellow">Tomorrow</span>'
            : daysUntil > 1 ? `<span class="chip chip-gray">${daysUntil}d</span>` : ''}
          ${sentChip}
        </div>
      </div>`;
    }).join('');

  } catch (e) {
    card.style.display = 'none';
  }
}

/* ── Home: Critical alert card ───────────────────────────────────────── */
async function loadCriticalAlert() {
  const card = document.getElementById('critical-card');
  const body = document.getElementById('critical-body');
  try {
    const data = await apiFetch('/api/system-alerts/recent?severity=critical&limit=1');
    const alerts = data?.alerts || (Array.isArray(data) ? data : []);
    if (!alerts.length) { card.style.display = 'none'; return; }

    const a = alerts[0];
    const ago = timeAgo(a.created_at || a.fired_at || a.timestamp);
    card.style.display = '';
    body.innerHTML = `<div class="alert-row">
      <div class="alert-hdr">
        <span class="chip chip-red">CRITICAL</span>
        <span class="alert-time">${ago}</span>
      </div>
      <div class="alert-title">${a.title || a.message || a.key || 'Alert'}</div>
      ${a.key ? `<div class="alert-key">${a.key}</div>` : ''}
    </div>`;
  } catch (e) {
    card.style.display = 'none';
  }
}

/* ── Home: Sentinel card ─────────────────────────────────────────────── */
async function loadSentinel() {
  const card = document.getElementById('sentinel-card');
  const body = document.getElementById('sentinel-body');
  try {
    const data = await apiFetch('/api/sentinel/recent?limit=1');
    const runs = data?.runs || (Array.isArray(data) ? data : []);
    if (!runs.length) { card.style.display = 'none'; return; }

    const r = runs[0];
    const riskCount = r.risk_count ?? r.risks?.length ?? 0;
    if (riskCount === 0) { card.style.display = 'none'; return; }

    const proposalCount = r.proposal_count ?? r.proposals?.length ?? 0;
    const mode = r.mode || '';
    const ago = timeAgo(r.created_at || r.run_at || r.timestamp);
    card.style.display = '';
    body.innerHTML = `
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        ${mode ? `<span class="chip chip-yellow">${mode}</span>` : ''}
        <span style="font-size:.72rem;color:var(--text3)">${ago}</span>
      </div>
      <div class="sentinel-meta">
        <div class="sentinel-stat">
          <div class="sentinel-stat-val neg">${riskCount}</div>
          <div class="sentinel-stat-lbl">Risks</div>
        </div>
        <div class="sentinel-stat">
          <div class="sentinel-stat-val" style="color:var(--accent)">${proposalCount}</div>
          <div class="sentinel-stat-lbl">Proposals</div>
        </div>
      </div>`;
  } catch (e) {
    card.style.display = 'none';
  }
}

/* ── Home: Market pulse ──────────────────────────────────────────────── */
async function loadPulse() {
  const body = document.getElementById('pulse-body');
  const symbols = ['SPY', 'QQQ', 'VIX', 'BTC-USD'];
  try {
    const data = await apiFetch('/api/quotes/batch?symbols=' + symbols.join(','));
    const quotes = data?.quotes || data || {};

    body.innerHTML = `<div id="pulse-scroll">` +
      symbols.map(sym => {
        const q = quotes[sym] || {};
        const price = q.price ?? q.c ?? null;
        const chg = q.change_pct ?? q.dp ?? null;
        const chgStr = chg != null ? fmtPct(chg) : '—';
        const col = chg != null ? (chg >= 0 ? 'var(--green)' : 'var(--red)') : 'var(--text2)';
        return `<div class="pulse-card">
          <div class="pulse-sym">${sym}</div>
          <div class="pulse-price">${price != null ? '$' + fmt2(price) : '—'}</div>
          <div class="pulse-chg" style="color:${col}">${chgStr}</div>
        </div>`;
      }).join('') + `</div>`;
  } catch (e) {
    body.innerHTML = `<div class="err-state">
      <button class="retry-btn" onclick="loadPulse()">Retry</button></div>`;
  }
}

/* ── Home: orchestrate ───────────────────────────────────────────────── */
async function loadHome() {
  // Fire P&L first (other cards may depend on _dashData)
  await loadPnl();
  // Then fire remaining in parallel
  Promise.allSettled([loadPositions(), loadCatalysts(), loadCriticalAlert(), loadSentinel(), loadPulse()]);
}

/* ── Alert badge polling ─────────────────────────────────────────────── */
async function pollAlertBadge() {
  try {
    const data = await apiFetch('/api/system-alerts/recent?severity=critical&limit=5');
    const alerts = data?.alerts || (Array.isArray(data) ? data : []);
    const badge = document.getElementById('alerts-badge');
    const bell = document.getElementById('bell-badge');
    const n = alerts.length;
    badge.textContent = n || '';
    badge.style.display = n ? '' : 'none';
    bell.textContent = n || '';
    bell.style.display = n ? '' : 'none';
  } catch (_) {/* silent — badge is non-critical UI */}
}

/* ── Pull-to-refresh ─────────────────────────────────────────────────── */
(function initPtr() {
  const main = document.getElementById('main');
  const ptr = document.getElementById('ptr');
  const label = document.getElementById('ptr-label');
  let startY = 0, pulling = false, fired = false, THRESHOLD = 64;

  main.addEventListener('touchstart', e => {
    if (main.scrollTop > 5) return;
    startY = e.touches[0].clientY;
    pulling = true; fired = false;
  }, { passive: true });

  main.addEventListener('touchmove', e => {
    if (!pulling) return;
    const dy = e.touches[0].clientY - startY;
    if (dy < 10) return;
    const pct = Math.min(dy / THRESHOLD, 1);
    ptr.style.height = (pct * 52) + 'px';
    ptr.classList.add('pulling');
    label.textContent = pct >= 1 ? '↑ Release to refresh' : 'Pull to refresh';
    if (pct >= 1 && !fired) { haptic(15); fired = true; }
  }, { passive: true });

  main.addEventListener('touchend', async () => {
    if (!pulling) return;
    pulling = false;
    if (fired) {
      ptr.classList.add('refreshing');
      ptr.classList.remove('pulling');
      label.textContent = 'Refreshing…';
      _loaded[_activeTab] = false;
      await loadTab(_activeTab);
    }
    ptr.style.height = '0';
    ptr.classList.remove('pulling', 'refreshing');
    label.textContent = 'Pull to refresh';
  }, { passive: true });
})();

/* ── Bottom Sheet Engine ─────────────────────────────────────────────── */
const _bsSheet    = document.getElementById('bs-sheet');
const _bsBackdrop = document.getElementById('bs-backdrop');
let _bsOpen = false;
let _bsRaf  = null;
let _bsCur  = 0;   // current translateY in px  (0 = fully visible)
let _bsTgt  = 0;   // target translateY
let _bsH    = 0;   // measured sheet height

function _bsApply(y) {
  _bsCur = y;
  _bsSheet.style.transform = `translateY(${y}px)`;
}

function _bsSpring() {
  const d = _bsTgt - _bsCur;
  if (Math.abs(d) < 0.35) {
    _bsApply(_bsTgt);
    if (_bsTgt >= _bsH) {          // fully dismissed
      _bsSheet.style.display  = 'none';
      _bsBackdrop.classList.remove('open');
      document.body.style.overflow = '';
      _bsOpen = false;
    }
    _bsRaf = null;
    return;
  }
  _bsApply(_bsCur + d * 0.22);    // spring coefficient — 60fps feels natural
  _bsRaf = requestAnimationFrame(_bsSpring);
}

function openSheet(title, subtitle, html) {
  document.getElementById('bs-title').textContent    = title || '';
  document.getElementById('bs-subtitle').textContent = subtitle || '';
  document.getElementById('bs-body').innerHTML       = html || '';
  _bsSheet.style.display    = 'flex';
  _bsSheet.style.transform  = 'translateY(100%)';
  _bsBackdrop.classList.add('open');
  document.body.style.overflow = 'hidden';
  requestAnimationFrame(() => {   // measure after display:flex
    _bsH   = _bsSheet.getBoundingClientRect().height;
    _bsCur = _bsH;
    _bsTgt = 0;
    _bsOpen = true;
    cancelAnimationFrame(_bsRaf);
    _bsRaf = requestAnimationFrame(_bsSpring);
  });
}

function _bsSetContent(title, subtitle, html) {
  document.getElementById('bs-title').textContent    = title || '';
  document.getElementById('bs-subtitle').textContent = subtitle || '';
  document.getElementById('bs-body').innerHTML       = html || '';
}

function closeSheet() {
  if (!_bsOpen) return;
  haptic(10);
  _bsH   = _bsSheet.getBoundingClientRect().height;
  _bsTgt = _bsH;
  cancelAnimationFrame(_bsRaf);
  _bsRaf = requestAnimationFrame(_bsSpring);
}

/* Drag handle — RAF-gated touchmove for 60fps */
(function() {
  const handle = document.getElementById('bs-handle');
  let startY = 0, startCur = 0, lastY = 0, lastT = 0, dragRaf = null;

  handle.addEventListener('touchstart', e => {
    if (!_bsOpen) return;
    startY = e.touches[0].clientY;  startCur = _bsCur;
    lastY  = startY;  lastT = Date.now();
    cancelAnimationFrame(_bsRaf);  _bsRaf = null;
  }, { passive: true });

  handle.addEventListener('touchmove', e => {
    if (!_bsOpen) return;
    const dy = e.touches[0].clientY - startY;
    _bsCur = Math.max(0, startCur + dy);
    lastY  = e.touches[0].clientY;  lastT = Date.now();
    if (!dragRaf) dragRaf = requestAnimationFrame(() => {
      _bsSheet.style.transform = `translateY(${_bsCur}px)`;
      dragRaf = null;
    });
  }, { passive: true });

  handle.addEventListener('touchend', () => {
    if (!_bsOpen) return;
    cancelAnimationFrame(dragRaf);  dragRaf = null;
    const elapsed = Math.max(1, Date.now() - lastT);
    const vel     = (lastY - startY) / elapsed * 1000;   // px/s
    if (_bsCur > _bsH * 0.36 || vel > 440) {
      if (_bsCur > _bsH * 0.36) haptic(18);              // threshold crossed
      _bsTgt = _bsH;
    } else {
      _bsTgt = 0;
    }
    cancelAnimationFrame(_bsRaf);
    _bsRaf = requestAnimationFrame(_bsSpring);
  }, { passive: true });
})();

/* ── Stock Detail Sheet ──────────────────────────────────────────────── */
async function openStock(symbol) {
  if (!symbol) return;
  haptic(10);
  closeLpPop();
  openSheet(symbol, 'Loading…',
    `<div class="skel" style="height:72px;border-radius:10px;margin-bottom:12px"></div>
     <div class="skel skel-card"></div>
     <div class="skel skel-card"></div>`);

  try {
    const [qRes, eRes] = await Promise.allSettled([
      apiFetch('/api/quote/' + symbol),
      apiFetch('/api/explorer/extras?symbol=' + symbol),
    ]);
    const q = qRes.status === 'fulfilled' ? qRes.value : {};
    const e = eRes.status === 'fulfilled' ? eRes.value : {};

    const price   = q.price ?? q.c ?? null;
    const chg     = q.change ?? 0;
    const chgPct  = q.change_pct ?? 0;
    const score   = e.analyst?.score ?? e.score ?? null;
    const grade   = e.analyst?.grade ?? null;
    const signals = e.signals || {};
    const news    = (e.news || []).slice(0, 2);

    // Update subtitle with live price
    const priceStr = price != null ? `$${fmt2(price)}  ${fmtPct(chgPct)}` : '';
    document.getElementById('bs-subtitle').textContent = priceStr;
    document.getElementById('bs-subtitle').className   = 'bs-title-sub ' + colorClass(chgPct);

    const sigRows = [
      signals.rsi       != null ? { k: 'RSI',       v: signals.rsi.toFixed(1),      cls: signals.rsi > 70 ? 'neg' : signals.rsi < 30 ? 'pos' : '' } : null,
      signals.rvol      != null ? { k: 'Rel Vol',    v: signals.rvol.toFixed(2)+'x', cls: signals.rvol > 2 ? 'pos' : '' } : null,
      signals.macd_signal       ? { k: 'MACD',       v: signals.macd_signal,          cls: signals.macd_signal === 'bullish' ? 'pos' : 'neg' } : null,
      signals.ema_trend         ? { k: 'EMA Trend',  v: signals.ema_trend,            cls: signals.ema_trend  === 'bullish' ? 'pos' : 'neg' } : null,
      signals.weekly_trend      ? { k: 'Weekly',     v: signals.weekly_trend,          cls: signals.weekly_trend === 'bullish' ? 'pos' : 'neg' } : null,
    ].filter(Boolean);

    document.getElementById('bs-body').innerHTML = `
      <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:16px">
        <div>
          <div class="sds-price">${price != null ? '$'+fmt2(price) : '—'}</div>
          <div class="sds-change ${colorClass(chg)}">${chg>=0?'+':''}${fmtDollar(chg)} (${fmtPct(chgPct)})</div>
        </div>
        ${score != null ? `<div style="text-align:center">
          <div class="sds-score-val" style="color:${score>=70?'var(--green)':score>=40?'var(--yellow)':'var(--red)'}">${Math.round(score)}</div>
          ${grade ? `<span class="chip ${score>=70?'chip-green':score>=40?'chip-yellow':'chip-red'}" style="font-size:.62rem">${grade}</span>` : ''}
          <div class="sds-score-lbl">Conviction</div>
        </div>` : ''}
      </div>

      ${sigRows.length ? `<div style="margin-bottom:14px">
        <div class="card-title" style="margin-bottom:8px">Signals</div>
        ${sigRows.map(r => `<div class="sds-signal-row">
          <span class="sds-signal-key">${r.k}</span>
          <span class="${r.cls}" style="font-weight:700">${escapeHtml(String(r.v))}</span>
        </div>`).join('')}
      </div>` : ''}

      ${news.length ? `<div style="margin-bottom:16px">
        <div class="card-title" style="margin-bottom:8px">News</div>
        ${news.map(n => `<div class="sds-news-item">
          <div class="sds-news-title">${escapeHtml(n.title||'')}</div>
          <div class="sds-news-meta">${escapeHtml(n.source||'')}${n.published?' · '+timeAgo(n.published):''}</div>
        </div>`).join('')}
      </div>` : ''}

      <div class="bs-trade-btns">
        <button class="bs-trade-btn bs-buy"  onclick="openQuickTrade('${symbol}','buy')">📈 Buy ${symbol}</button>
        <button class="bs-trade-btn bs-sell" onclick="openQuickTrade('${symbol}','sell')">📉 Sell ${symbol}</button>
      </div>`;
  } catch (err) {
    document.getElementById('bs-body').innerHTML =
      `<div class="err-state">${escapeHtml(symbol)} data unavailable<br>
       <button class="retry-btn" onclick="openStock('${escapeHtml(symbol)}')">Retry</button></div>`;
  }
}

/* ── Quick Trade — 2-step: build → review → place ───────────────────── */
const _QT_SRCS = [
  { key:'paper',       api:'paper',       label:'📄 Paper' },
  { key:'moomoo',      api:'moomoo',      label:'💰 Moomoo' },
  { key:'alpaca_live', api:'alpaca_live', label:'🔴 Live' },
];
let _qt = { sym:'', side:'buy', srcKey:'paper', qtyMode:'shares', qty:1, otype:'market', limitPrice:null, livePrice:null };

function _qtSrcDefault() {
  return SOURCE === 'moomoo' ? 'moomoo' : SOURCE === 'alpaca_live' ? 'alpaca_live' : 'paper';
}

function _qtSync() {
  const s = document.getElementById('qt-sym');
  const q = document.getElementById('qt-qty');
  const l = document.getElementById('qt-limit');
  if (s) _qt.sym        = s.value.trim().toUpperCase();
  if (q) _qt.qty        = Math.max(1, +q.value || 1);
  if (l && l.value) _qt.limitPrice = +l.value;
}

function _buildStep1Html() {
  const src = _QT_SRCS.find(s => s.key === _qt.srcKey) || _QT_SRCS[0];
  return `
    <div class="qt-toggle">
      <button class="qt-toggle-btn ${_qt.side==='buy'?'active-buy':''}"  onclick="_qtSetSide('buy')">Buy</button>
      <button class="qt-toggle-btn ${_qt.side==='sell'?'active-sell':''}" onclick="_qtSetSide('sell')">Sell</button>
    </div>

    <div class="qt-label">Symbol</div>
    <input id="qt-sym" class="qt-sym-input" type="text" value="${escapeHtml(_qt.sym)}"
      maxlength="8" placeholder="e.g. AAPL"
      oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9.]/g,'');_qt.sym=this.value">

    <div class="qt-label">Account</div>
    <div class="qt-acct-row">
      ${_QT_SRCS.map(s => `<button class="qt-acct-btn ${s.key===_qt.srcKey?'active':''}"
        onclick="_qtSetSrc('${s.key}')">${s.label}</button>`).join('')}
    </div>

    <div class="qt-label">Quantity</div>
    <div class="qt-toggle" style="margin-bottom:8px">
      <button class="qt-toggle-btn ${_qt.qtyMode==='shares'?'active-seg':''}" onclick="_qtSetMode('shares')">Shares</button>
      <button class="qt-toggle-btn ${_qt.qtyMode==='dollars'?'active-seg':''}" onclick="_qtSetMode('dollars')">Dollars $</button>
    </div>
    <div class="qt-stepper">
      <button class="qt-step-btn" onclick="_qtAdj(-1)">−</button>
      <input class="qt-qty-input" id="qt-qty" type="number" min="1" step="1" value="${_qt.qty}"
        oninput="_qt.qty=Math.max(1,+this.value||1);_qtCalcTotal()">
      <button class="qt-step-btn" onclick="_qtAdj(1)">+</button>
    </div>

    <div class="qt-label">Order Type</div>
    <div class="qt-otype-row">
      <button class="qt-otype-btn ${_qt.otype==='market'?'active':''}"     onclick="_qtSetOtype('market')">Market</button>
      <button class="qt-otype-btn ${_qt.otype==='limit'?'active':''}"      onclick="_qtSetOtype('limit')">Limit</button>
      <button class="qt-otype-btn ${_qt.otype==='stop_limit'?'active':''}" onclick="_qtSetOtype('stop_limit')">Stop Limit</button>
    </div>

    <div id="qt-limit-wrap" style="display:${_qt.otype!=='market'?'block':'none'}">
      <input class="qt-limit-input" id="qt-limit" type="number" step="0.01" min="0.01"
        value="${_qt.limitPrice != null ? _qt.limitPrice.toFixed(2) : ''}"
        placeholder="Limit price"
        oninput="_qt.limitPrice=+this.value||null;_qtCalcTotal()">
    </div>
    <div class="qt-price-hint" id="qt-hint">${_qt.livePrice ? 'Live: $'+fmt2(_qt.livePrice) : 'Fetching price…'}</div>

    <div class="qt-total">
      <span class="qt-total-lbl">Est. ${_qt.qtyMode==='dollars'?'Shares':'Total'}</span>
      <span class="qt-total-val" id="qt-est"></span>
    </div>

    <button class="qt-cta ${_qt.side}" onclick="_qtReview()">
      Review ${_qt.side==='buy'?'Buy':'Sell'} Order →
    </button>`;
}

function _qtCalcTotal() {
  const el = document.getElementById('qt-est');
  if (!el) return;
  const price = _qt.otype !== 'market' ? _qt.limitPrice : _qt.livePrice;
  if (_qt.qtyMode === 'dollars') {
    el.textContent = price && _qt.qty ? Math.floor(_qt.qty / price) + ' shares' : '—';
  } else {
    el.textContent = price && _qt.qty ? fmtDollar(price * _qt.qty) : '—';
  }
}

function _qtRenderStep1() {
  _bsSetContent(
    _qt.sym || 'Quick Trade',
    _qt.side === 'buy' ? '📈 Buy Order' : '📉 Sell Order',
    _buildStep1Html()
  );
  _qtCalcTotal();
}

function _qtSetSide(s)  { _qtSync(); _qt.side  = s; _qtRenderStep1(); }
function _qtSetSrc(k)   { _qtSync(); _qt.srcKey = k; _qtRenderStep1(); }
function _qtSetMode(m)  { _qtSync(); _qt.qtyMode = m; _qtRenderStep1(); }
function _qtSetOtype(t) {
  _qtSync(); _qt.otype = t;
  const w = document.getElementById('qt-limit-wrap');
  if (w) { w.style.display = t !== 'market' ? 'block' : 'none'; }
  else _qtRenderStep1();
  _qtCalcTotal();
}
function _qtAdj(d) {
  _qt.qty = Math.max(1, (_qt.qty || 1) + d);
  const el = document.getElementById('qt-qty');
  if (el) el.value = _qt.qty;
  haptic(5);
  _qtCalcTotal();
}

async function openQuickTrade(symbol, side) {
  closeLpPop();
  _qt = {
    sym:        symbol ? symbol.toUpperCase() : '',
    side:       side || 'buy',
    srcKey:     _qtSrcDefault(),
    qtyMode:    'shares',
    qty:        1,
    otype:      'market',
    limitPrice: null,
    livePrice:  null,
  };
  if (_bsOpen) {
    _qtRenderStep1();
  } else {
    openSheet(_qt.sym || 'Quick Trade', _qt.side==='buy' ? '📈 Buy Order' : '📉 Sell Order', _buildStep1Html());
    _qtCalcTotal();
  }
  // Fetch live price async
  if (_qt.sym) _qtFetchPrice(_qt.sym);
}

async function _qtFetchPrice(sym) {
  try {
    const q = await apiFetch('/api/quote/' + sym);
    _qt.livePrice = q?.price ?? q?.c ?? null;
    if (_qt.livePrice) {
      const hint = document.getElementById('qt-hint');
      if (hint) hint.textContent = 'Live: $' + fmt2(_qt.livePrice);
      const lim = document.getElementById('qt-limit');
      if (lim && !lim.value) lim.value = _qt.livePrice.toFixed(2);
      _qtCalcTotal();
    }
  } catch (_) {}
}

function _qtReview() {
  _qtSync();
  if (!_qt.sym) { toast('Enter a symbol'); return; }
  if (_qt.otype !== 'market' && !_qt.limitPrice) { toast('Enter a limit price'); return; }
  if (_qt.qty < 1) { toast('Quantity must be at least 1'); return; }

  const src = _QT_SRCS.find(s => s.key === _qt.srcKey) || _QT_SRCS[0];
  const resolvedQty = _qt.qtyMode === 'dollars' && _qt.livePrice
    ? Math.max(1, Math.floor(_qt.qty / _qt.livePrice))
    : _qt.qty;
  const price    = _qt.otype !== 'market' ? _qt.limitPrice : _qt.livePrice;
  const estTotal = price ? price * resolvedQty : null;
  const isBuy    = _qt.side === 'buy';

  _bsSetContent(
    _qt.sym,
    isBuy ? '📈 Review Buy Order' : '📉 Review Sell Order',
    `<button class="qt-back-btn" onclick="openQuickTrade('${_qt.sym}','${_qt.side}')">← Edit Order</button>
     <div class="qt-review-card">
       <div class="qt-review-row"><span>Symbol</span><strong>${escapeHtml(_qt.sym)}</strong></div>
       <div class="qt-review-row"><span>Side</span>
         <strong class="${isBuy?'pos':'neg'}">${_qt.side.toUpperCase()}</strong></div>
       <div class="qt-review-row"><span>Quantity</span>
         <span>${resolvedQty} share${resolvedQty!==1?'s':''}</span></div>
       <div class="qt-review-row"><span>Order Type</span>
         <span>${_qt.otype==='market'?'Market':_qt.otype==='limit'?'Limit @ $'+_qt.limitPrice?.toFixed(2):'Stop Limit @ $'+_qt.limitPrice?.toFixed(2)}</span></div>
       <div class="qt-review-row"><span>Account</span><span>${src.label}</span></div>
       ${_qt.livePrice ? `<div class="qt-review-row"><span>Live Price</span><span>$${fmt2(_qt.livePrice)}</span></div>` : ''}
       <div class="qt-review-row total-row">
         <span>Est. Total</span><span>${estTotal!=null?fmtDollar(estTotal):'—'}</span>
       </div>
     </div>
     <button id="qt-place-btn" class="qt-cta ${_qt.side}" onclick="_qtPlace(this)">
       ✓ Place ${isBuy?'Buy':'Sell'} Order
     </button>`
  );
  haptic(10);
}

async function _qtPlace(btn) {
  btn.disabled    = true;
  btn.textContent = 'Placing…';
  haptic(20);

  const src    = _QT_SRCS.find(s => s.key === _qt.srcKey) || _QT_SRCS[0];
  const qty    = _qt.qtyMode === 'dollars' && _qt.livePrice
    ? Math.max(1, Math.floor(_qt.qty / _qt.livePrice))
    : _qt.qty;
  const body   = { symbol: _qt.sym, side: _qt.side, qty, order_type: _qt.otype, source: src.api };
  if (_qt.otype !== 'market' && _qt.limitPrice) body.limit_price = _qt.limitPrice;

  try {
    const res = await apiFetch('/api/trade/quick', { method:'POST', body:JSON.stringify(body) });
    if (res.error) throw new Error(res.error);
    haptic([20, 50, 20]);
    toast(`✅ ${_qt.side.toUpperCase()} ${qty} ${_qt.sym} placed · ${src.label}`);
    closeSheet();
    // Refresh home if active
    _loaded['home'] = false;
    if (_activeTab === 'home') loadHome();
  } catch (err) {
    haptic([30, 20, 30]);
    toast(`❌ ${err.message || 'Order failed'}`, 4000);
    btn.disabled    = false;
    btn.textContent = `✓ Place ${_qt.side==='buy'?'Buy':'Sell'} Order`;
  }
}

const _lpPop = document.getElementById('lp-pop');
let _lpSym = '', _lpTimer = null, _lpFired = false, _lpX0 = 0, _lpY0 = 0;

function closeLpPop() { _lpPop.style.display = 'none'; _lpSym = ''; }

function _lpShow(sym, x, y) {
  _lpSym = sym;
  _lpPop.innerHTML =
    `<button class="lp-pop-item" onclick="_lpAct('detail')">🔍 View Detail</button>
     <button class="lp-pop-item" onclick="_lpAct('buy')">📈 Quick Buy</button>
     <button class="lp-pop-item" onclick="_lpAct('sell')">📉 Quick Sell</button>
     <button class="lp-pop-item" onclick="_lpAct('watchlist')">❤️ Add to Watchlist</button>`;
  const pw = 190, ph = 188;
  _lpPop.style.left    = Math.min(x, window.innerWidth  - pw - 8) + 'px';
  _lpPop.style.top     = Math.min(y - 10, window.innerHeight - ph - 8) + 'px';
  _lpPop.style.display = 'block';
}

async function _lpAct(action) {
  const sym = _lpSym;
  closeLpPop();
  if      (action === 'detail')    openStock(sym);
  else if (action === 'buy')       openQuickTrade(sym, 'buy');
  else if (action === 'sell')      openQuickTrade(sym, 'sell');
  else if (action === 'watchlist') {
    try {
      await apiFetch('/api/watchlist/add', { method:'POST', body:JSON.stringify({ symbol:sym }) });
      toast(`❤️ ${sym} added to watchlist`);
    } catch (e) { toast('Failed to add to watchlist'); }
  }
}

/* Event delegation — long-press on any stock row in #main */
(function() {
  const main = document.getElementById('main');

  function _extractSym(el) {
    for (let i = 0; i < 5 && el; i++, el = el.parentElement) {
      const m = (el.getAttribute?.('onclick') || '').match(/openStock\(['"]([A-Z0-9.\-]{1,10})['"]\)/);
      if (m) return m[1];
    }
    return null;
  }

  main.addEventListener('pointerdown', e => {
    const sym = _extractSym(e.target);
    if (!sym) return;
    _lpX0 = e.clientX;  _lpY0 = e.clientY;
    _lpFired = false;
    _lpTimer = setTimeout(() => {
      haptic([15, 30, 15]);
      _lpFired = true;
      _lpShow(sym, _lpX0, _lpY0);
    }, 500);
  });

  main.addEventListener('pointermove', e => {
    if (!_lpTimer) return;
    if (Math.abs(e.clientX - _lpX0) > 10 || Math.abs(e.clientY - _lpY0) > 10) {
      clearTimeout(_lpTimer);  _lpTimer = null;
    }
  });

  const _lpCancel = () => { clearTimeout(_lpTimer); _lpTimer = null; };
  main.addEventListener('pointerup',     _lpCancel);
  main.addEventListener('pointercancel', _lpCancel);

  // Swallow the click that follows a long-press (capture phase, before onclick fires)
  main.addEventListener('click', e => {
    if (_lpFired) { _lpFired = false; e.stopImmediatePropagation(); e.preventDefault(); }
  }, true);

  // Dismiss popover on outside touch
  document.addEventListener('pointerdown', e => {
    if (_lpPop.style.display !== 'none' && !_lpPop.contains(e.target)) closeLpPop();
  }, { capture: true });
})();

/* ── Utility: time ago ───────────────────────────────────────────────── */
function timeAgo(ts) {
  if (!ts) return '';
  const diff = (Date.now() - new Date(ts).getTime()) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  return Math.floor(diff / 86400) + 'd ago';
}

/* ── Segmented control helper ────────────────────────────────────────── */
const _panelLoaded = {};

function initSegCtrl(ctrlId, prefix, loader) {
  const ctrl = document.getElementById(ctrlId);
  if (!ctrl) return;
  const saved = localStorage.getItem(prefix + '-seg');

  ctrl.querySelectorAll('.seg').forEach(btn => {
    if (saved && btn.dataset.panel === saved) {
      ctrl.querySelectorAll('.seg').forEach(b => { b.classList.remove('active'); b.setAttribute('aria-selected','false'); });
      btn.classList.add('active'); btn.setAttribute('aria-selected','true');
      document.querySelectorAll('#screen-' + prefix.replace('mkts','markets').replace('whale','whale') + ' .seg-panel')
        .forEach(p => p.classList.remove('active'));
      document.getElementById(prefix + '-' + saved)?.classList.add('active');
    }
    btn.addEventListener('click', () => {

/* ── Conviction chip helper ──────────────────────────────────────────── */
function convictionChip(score) {
  if (score == null) return '';
  const n = parseFloat(score);
  if (n >= 75) return '<span class="chip chip-green">🐂 Strong</span>';
  if (n >= 55) return '<span class="chip chip-blue">⚖️ Neutral</span>';
  return '<span class="chip chip-red">🐻 Weak</span>';
}
function scoreBar(score) {
  const n = Math.min(100, Math.max(0, parseFloat(score) || 0));
  const c = n >= 70 ? 'var(--green)' : n >= 45 ? 'var(--accent)' : 'var(--red)';
  return `<div class="sig-score-bar"><div class="sig-score-fill" style="width:${n}%;background:${c}"></div></div>
          <div class="sig-score-num" style="color:${c}">${Math.round(n)}</div>`;
}

async function loadMarketsCatalysts() {
  const el = document.getElementById('mkts-catalysts');
  el.innerHTML = '<div class="skel skel-row"></div><div class="skel skel-row"></div><div class="skel skel-row"></div>';
  try {
    const data = await apiFetch('/api/tomorrow-catalysts');
    const cats = data?.catalysts || (Array.isArray(data) ? data : []);
    if (!cats.length) { el.innerHTML = '<div class="empty-state">No upcoming catalysts</div>'; return; }

    const groups = { amc: [], bmo: [], pre: [] };
    cats.forEach(c => {
      const t = (c.timing || c.when || '').toLowerCase();
      if (t.includes('amc') || t.includes('after')) groups.amc.push(c);
      else if (t.includes('bmo') || t.includes('before')) groups.bmo.push(c);
      else groups.pre.push(c);

    const renderGroup = (label, items) => {
      if (!items.length) return '';

                letter-spacing:.08em;margin:12px 0 6px">${label}</div>` +

          const eps = c.eps_estimate != null ? `EPS est. ${c.eps_estimate > 0 ? '+' : ''}${parseFloat(c.eps_estimate).toFixed(2)}` : '';
          const surp = c.avg_surprise != null ? `Avg surp ${c.avg_surprise > 0 ? '+' : ''}${parseFloat(c.avg_surprise).toFixed(1)}%` : '';
          return `<div class="cat-row" onclick="openStock('${c.symbol}')">
            <div>
              <div class="cat-sym">${c.symbol}</div>
              <div class="cat-co">${c.company || c.name || ''}</div>
            </div>
            <div class="cat-chips">
              ${c.timing ? `<span class="chip chip-blue">${c.timing.toUpperCase()}</span>` : ''}
              ${eps ? `<span class="chip chip-gray">${eps}</span>` : ''}
              ${surp ? `<span class="chip ${c.avg_surprise >= 0 ? 'chip-green' : 'chip-red'}">${surp}</span>` : ''}
              ${convictionChip(c.score ?? c.conviction)}
            </div>
          </div>`;
        }).join('');
    };

    el.innerHTML = renderGroup('AMC Tonight', groups.amc) +

/* Markets › Signals */
async function loadMarketsSignals() {
  const el = document.getElementById('mkts-signals');
  el.innerHTML = '<div class="skel skel-card"></div><div class="skel skel-card"></div>';
  try {
    const [picksRes, buysRes] = await Promise.allSettled([
      apiFetch('/api/intraday-picks'),
      apiFetch('/api/strong-buys'),
    ]);
    const picks = picksRes.status === 'fulfilled' ? (picksRes.value?.picks || picksRes.value?.stocks || []) : [];
    const buys  = buysRes.status  === 'fulfilled' ? (buysRes.value?.stocks  || buysRes.value?.results  || []) : [];

    const seen = new Set();
    const combined = [...picks, ...buys].filter(s => {
      if (!s?.symbol || seen.has(s.symbol)) return false;
      seen.add(s.symbol); return true;
    }).sort((a, b) => (b.score ?? 0) - (a.score ?? 0));

    if (!combined.length) { el.innerHTML = '<div class="empty-state">No signals right now</div>'; return; }

    el.innerHTML = combined.slice(0, 25).map(s => {
      const reasons = (s.reasons || s.signals || []).slice(0, 3);
      return `<div class="sig-card" onclick="openStock('${s.symbol}')">
        <div class="sig-top">
          <div class="sig-sym">${s.symbol}</div>
          ${convictionChip(s.score)}
          ${scoreBar(s.score)}
        </div>
        ${reasons.length ? `<div class="sig-reasons">${reasons.map(r => `<div class="sig-reason">${r}</div>`).join('')}</div>` : ''}
      </div>`;
    }).join('');
  } catch (e) {
    el.innerHTML = `<div class="err-state">Failed to load<br><button class="retry-btn" onclick="loadMarketsSignals()">Retry</button></div>`;
  }
}

/* Markets › Calendar */
let _calDay = 0;
async function loadMarketsCalendar() {
  const el = document.getElementById('mkts-calendar');
  const today = new Date();
  const dow = today.getDay(); // 0=Sun
  // Build Mon-Fri of current week
  const monday = new Date(today);
  monday.setDate(today.getDate() - (dow === 0 ? 6 : dow - 1));
  const weekDays = [0,1,2,3,4].map(i => {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    return d;
  });
  const dayNames = ['Mon','Tue','Wed','Thu','Fri'];
  const fmtDate = d => d.toISOString().split('T')[0];
  const todayIdx = Math.max(0, Math.min(4, dow === 0 ? 4 : dow - 1));
  _calDay = todayIdx;

  const dayTabsHtml = weekDays.map((d, i) => `
    <button class="cal-day-btn ${i === todayIdx ? 'active' : ''}"
      data-idx="${i}" onclick="selectCalDay(${i}, weekDays_${i})" aria-selected="${i === todayIdx}">
      <div class="cal-day-name">${dayNames[i]}</div>
      <div class="cal-day-num">${d.getDate()}</div>
    </button>`).join('');

  el.innerHTML = `<div class="cal-days">${dayTabsHtml}</div><div id="cal-events-body">
    <div class="skel skel-row"></div><div class="skel skel-row"></div>
  </div>`;

  // Wire day buttons properly
  el.querySelectorAll('.cal-day-btn').forEach((btn, i) => {
    btn.addEventListener('click', () => loadCalDay(weekDays[i], el, el.querySelectorAll('.cal-day-btn'), i));
  });

  loadCalDay(weekDays[todayIdx], el, el.querySelectorAll('.cal-day-btn'), todayIdx);
}

async function loadCalDay(date, el, btns, idx) {
  btns.forEach((b, i) => { b.classList.toggle('active', i === idx); b.setAttribute('aria-selected', String(i === idx)); });
  haptic(10);
  const body = el.querySelector('#cal-events-body');
  body.innerHTML = '<div class="skel skel-row"></div><div class="skel skel-row"></div>';
  try {
    const fmtDate = d => d.toISOString().split('T')[0];
    const data = await apiFetch('/api/earnings-calendar?date=' + fmtDate(date));
    const events = data?.events || data?.earnings || (Array.isArray(data) ? data : []);
    if (!events.length) { body.innerHTML = '<div class="empty-state">No earnings this day</div>'; return; }
    body.innerHTML = events.map(e => {
      const timing = e.timing || e.when || e.time || '';
      const eps = e.eps_estimate ?? e.estimate;
      return `<div class="cal-row" onclick="openStock('${e.symbol}')">
        <div>
          <div class="cal-sym">${e.symbol}</div>
          <div class="cal-co">${e.company || e.name || ''}</div>

        <div class="cal-right">
          ${timing ? `<span class="chip chip-blue" style="font-size:.65rem">${timing.toUpperCase()}</span>` : ''}
          ${eps != null ? `<div class="cal-eps">EPS est. ${parseFloat(eps).toFixed(2)}</div>` : ''}

  } catch (e) {
    body.innerHTML = `<div class="err-state">Failed to load<br><button class="retry-btn" onclick="loadMarketsCalendar()">Retry</button></div>`;
  }
}

async function loadWhaleInsider() {
  const el = document.getElementById('whale-insider');
  el.innerHTML = '<div class="skel skel-card"></div><div class="skel skel-card"></div>';
  try {
    const data = await apiFetch('/api/uw/insider');
    const trades = data?.insider || data?.trades || (Array.isArray(data) ? data : []);
    if (!trades.length) { el.innerHTML = '<div class="empty-state">No insider data<br><span style="font-size:.72rem;color:var(--text3)">Requires UW_API_KEY</span></div>'; return; }

    // Group by ticker
    const byTicker = {};
    trades.forEach(t => {
      const sym = t.ticker || t.symbol;
      if (!byTicker[sym]) byTicker[sym] = { net: 0, items: [] };
      const val = parseFloat(t.value || t.amount || 0);
      const isBuy = (t.transaction_type || t.type || '').toLowerCase().includes('buy') || (t.value || 0) > 0;
      byTicker[sym].net += isBuy ? val : -val;
      byTicker[sym].items.push({ ...t, isBuy, val });

    el.innerHTML = Object.entries(byTicker)
      .sort(([,a],[,b]) => Math.abs(b.net) - Math.abs(a.net))
      .slice(0, 15)

          </div>
          <div class="ins-detail">
            ${name}${role ? ' · ' + role : ''}${top?.isBuy ? ' <span class="pos">BUY</span>' : ' <span class="neg">SELL</span>'}
